<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- ══════════════════════════════════════ -->
    <!-- PWA META TAGS — ADD ALL OF THESE       -->
    <!-- ══════════════════════════════════════ -->

    <!-- App name + description -->
    <meta name="application-name" content="WorkFlow HR" />
    <meta name="description" content="AI-powered HR Management System" />

    <!-- Theme color — matches your gold accent -->
    <meta name="theme-color" content="#C8A96E" />

    <!-- iOS specific — makes it feel native on iPhone -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WorkFlow HR" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- PWA Manifest link -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Favicon (keep your existing one or replace) -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Apple touch icon — shown on iPhone home screen -->
    <!-- If you have icon-192.png in public/ folder, this works automatically -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icon-192.png" />

    <title>WorkFlow HR</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
